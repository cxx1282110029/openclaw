<!DOCTYPE html>
<html>
<head>
    <title>自动化表单测试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #0078D7; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005a9e; }
        .success { color: green; margin-top: 20px; padding: 10px; background: #e8f5e8; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>📝 自动化表单测试</h1>
    <p>这是一个用于测试自动化填写表单的示例页面。</p>
    
    <form id="testForm">
        <div class="form-group">
            <label for="name">姓名：</label>
            <input type="text" id="name" name="name" placeholder="请输入您的姓名">
        </div>
        
        <div class="form-group">
            <label for="email">邮箱：</label>
            <input type="email" id="email" name="email" placeholder="example@email.com">
        </div>
        
        <div class="form-group">
            <label for="phone">电话：</label>
            <input type="tel" id="phone" name="phone" placeholder="13800138000">
        </div>
        
        <div class="form-group">
            <label for="gender">性别：</label>
            <select id="gender" name="gender">
                <option value="">请选择</option>
                <option value="male">男</option>
                <option value="female">女</option>
                <option value="other">其他</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="age">年龄：</label>
            <input type="number" id="age" name="age" min="1" max="120" placeholder="25">
        </div>
        
        <div class="form-group">
            <label for="city">城市：</label>
            <input type="text" id="city" name="city" placeholder="北京">
        </div>
        
        <div class="form-group">
            <label for="message">留言：</label>
            <textarea id="message" name="message" rows="4" placeholder="请输入您的留言..."></textarea>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" id="agree" name="agree">
                我同意服务条款
            </label>
        </div>
        
        <button type="submit">提交表单</button>
    </form>
    
    <div id="result" class="success" style="display: none;">
        表单提交成功！数据已保存。
    </div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 收集表单数据
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                age: document.getElementById('age').value,
                city: document.getElementById('city').value,
                message: document.getElementById('message').value,
                agree: document.getElementById('agree').checked
            };
            
            console.log('表单数据:', formData);
            
            // 显示成功消息
            document.getElementById('result').style.display = 'block';
            
            // 3秒后重置表单
            setTimeout(() => {
                document.getElementById('testForm').reset();
                document.getElementById('result').style.display = 'none';
            }, 3000);
            
            return false;
        });
    </script>
</body>
</html>
